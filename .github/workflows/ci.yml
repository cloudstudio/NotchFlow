name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (macOS)
    # macos-14's default toolchain is Xcode 15.4 / Swift 5.10, which cannot read
    # `swift-tools-version: 6.0`. macos-15 ships Xcode 16.x.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Swift version
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build (incl. tests)
        run: swift build --build-tests
      - name: Test
        run: swift test

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      # Non-blocking for now: the size rules are advisory until the refactor
      # fully settles. Flip to blocking `--strict` once thresholds are tightened.
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging || true
